name: hiergeonet
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # PyTorch — change cudatoolkit version to match your GPU
  - pytorch=2.1.0
  - torchvision=0.16.0
  - pytorch-cuda=12.1   # or 11.8 for older GPUs

  # Geospatial
  - geopandas>=0.14
  - rasterio>=1.3
  - shapely>=2.0
  - pyproj>=3.6

  # Data science
  - numpy>=1.24
  - pandas>=2.1
  - scipy>=1.11
  - scikit-learn>=1.3
  - matplotlib>=3.8
  - seaborn>=0.13
  - h5py>=3.9
  - tqdm>=4.66

  # pip-only packages
  - pip:
    - torch-geometric>=2.4.0
    - torch_scatter
    - torch_sparse
    - torch_cluster
    - torch_spline_conv
    - xgboost>=2.0.0
